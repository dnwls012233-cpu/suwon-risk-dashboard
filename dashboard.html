<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수원시 도로 위험도 예측 대시보드</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Panel backgrounds — layered dark */
      --bg-base:   #0a0a0f;
      --bg-panel:  #111118;
      --bg-card:   #17171f;
      --bg-card2:  #1e1e28;
      --border:    rgba(255,255,255,0.06);
      --border-md: rgba(255,255,255,0.10);
      --border-hi: rgba(255,255,255,0.16);

      /* Text */
      --tx-1: #f2f2ff;
      --tx-2: #9090b0;
      --tx-3: #50506a;

      /* Purple scale — dark→bright = low→high risk */
      --c-vlow:  #3d1a6e;
      --c-low:   #6d2fcf;
      --c-mid:   #9d5cf6;
      --c-high:  #c99cf2;
      --c-vhigh: #ecdeff;

      --topbar-h: 54px;
      --sidebar-w: 272px;
      --detail-w: 316px;
      --r: 10px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--tx-1);
    }

    /* ── MAP ── */
    #map { position: fixed; inset: 0; z-index: 0; }

    /* ── TOP BAR ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      z-index: 100;
      background: rgba(10,10,15,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 20px;
    }

    #logo {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 200px;
    }
    #logo-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--tx-1);
      letter-spacing: -0.4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-pip {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--c-mid);
      box-shadow: 0 0 10px var(--c-mid);
      flex-shrink: 0;
      animation: pip-pulse 2.4s ease-in-out infinite;
    }
    @keyframes pip-pulse {
      0%,100% { box-shadow: 0 0 6px var(--c-mid); }
      50%      { box-shadow: 0 0 14px var(--c-mid), 0 0 24px var(--c-low); }
    }
    #logo-sub {
      font-size: 10px;
      color: var(--tx-3);
      font-weight: 400;
      padding-left: 16px;
    }

    /* legend */
    #legend {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .lchip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--tx-2);
      cursor: default;
    }
    .ldot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* right controls */
    #topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 200px;
      justify-content: flex-end;
    }
    select#district-filter {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-md);
      color: var(--tx-1);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 7px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    select#district-filter:focus { border-color: var(--c-mid); }
    select#district-filter option { background: #111118; }
    .btn-ghost {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-md);
      color: var(--tx-1);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 6px 13px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.09); border-color: var(--c-mid); }

    /* ── SEARCH ── */
    #search-wrap {
      position: fixed;
      top: calc(var(--topbar-h) + 12px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 90;
      width: 340px;
    }
    #search-input {
      width: 100%;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-md);
      color: var(--tx-1);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 9px 34px 9px 38px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #search-input::placeholder { color: var(--tx-3); }
    #search-input:focus {
      border-color: var(--c-mid);
      box-shadow: 0 0 0 3px rgba(157,92,246,0.15);
    }
    #search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--tx-3);
      pointer-events: none;
    }
    #search-clear {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--tx-3);
      cursor: pointer;
      display: none;
      padding: 2px;
      border-radius: 4px;
    }
    #search-clear:hover { color: var(--tx-1); }
    #search-results {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: rgba(10,10,18,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-md);
      border-radius: 8px;
      overflow: hidden;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }
    .search-item {
      padding: 9px 14px;
      font-size: 12px;
      color: var(--tx-1);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: rgba(157,92,246,0.12); }
    .si-name { font-weight: 500; }
    .si-tag { font-size: 10px; color: var(--tx-3); }

    /* ════════════════════════════════
       LEFT SIDEBAR
    ════════════════════════════════ */
    #sidebar {
      position: fixed;
      top: var(--topbar-h);
      left: 0;
      width: var(--sidebar-w);
      height: calc(100vh - var(--topbar-h));
      z-index: 80;
      background: rgba(10,10,15,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(157,92,246,0.25) transparent;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: rgba(157,92,246,0.25); border-radius: 2px; }

    /* Section label */
    .sec-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--tx-3);
      padding: 0 2px;
      margin-bottom: 2px;
    }

    /* ── KPI row ── */
    .kpi-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 14px 12px;
    }
    .kpi-val {
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1px;
      color: var(--tx-1);
    }
    .kpi-lbl {
      font-size: 10px;
      color: var(--tx-2);
      margin-top: 5px;
    }

    /* ── donut card ── */
    .donut-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 14px 12px;
    }
    .donut-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 12px auto 0;
    }
    .donut-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .donut-center-val {
      font-size: 20px;
      font-weight: 800;
      color: var(--c-mid);
      line-height: 1;
      letter-spacing: -0.5px;
    }
    .donut-center-lbl {
      font-size: 8px;
      color: var(--tx-3);
      margin-top: 2px;
      text-align: center;
    }
    .risk-legend {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .rl-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .rl-left {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--tx-2);
    }
    .rl-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .rl-val {
      font-size: 11px;
      font-weight: 600;
      color: var(--tx-1);
    }

    /* ── top 10 card ── */
    .top10-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 12px 10px;
    }
    .top-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 6px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .top-item:hover { background: rgba(255,255,255,0.04); }
    .top-num {
      font-size: 10px;
      font-weight: 700;
      color: var(--tx-3);
      min-width: 16px;
      text-align: right;
    }
    .top-num.gold   { color: #e8b84b; }
    .top-num.silver { color: #8fa3b8; }
    .top-num.bronze { color: #b07748; }
    .top-info { flex: 1; min-width: 0; }
    .top-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--tx-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-sub {
      font-size: 10px;
      color: var(--tx-3);
      margin-top: 1px;
    }
    .top-score {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    /* ════════════════════════════════
       RIGHT DETAIL PANEL
    ════════════════════════════════ */
    #detail-panel {
      position: fixed;
      top: var(--topbar-h);
      right: 0;
      width: var(--detail-w);
      height: calc(100vh - var(--topbar-h));
      z-index: 80;
      background: rgba(10,10,15,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(157,92,246,0.25) transparent;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #detail-panel.open { transform: translateX(0); }
    #detail-panel::-webkit-scrollbar { width: 3px; }
    #detail-panel::-webkit-scrollbar-track { background: transparent; }
    #detail-panel::-webkit-scrollbar-thumb { background: rgba(157,92,246,0.25); border-radius: 2px; }

    /* Detail header card */
    .d-header-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
      position: relative;
    }
    #detail-close {
      position: absolute;
      top: 12px; right: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border-md);
      color: var(--tx-2);
      width: 26px; height: 26px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    #detail-close:hover { background: rgba(255,255,255,0.11); color: var(--tx-1); }
    #detail-road-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--tx-1);
      line-height: 1.2;
      letter-spacing: -0.4px;
      padding-right: 32px;
      margin-bottom: 8px;
    }
    .badge-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .dbadge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border-md);
      color: var(--tx-2);
    }
    .dbadge.risk {
      border-color: transparent;
      color: #0a0a0f;
      font-weight: 700;
    }

    /* Detail generic card */
    .d-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
    }
    .d-card-title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--tx-3);
      margin-bottom: 12px;
    }

    /* Pred vs actual */
    .pred-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .pred-box {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 10px;
      text-align: center;
    }
    .pred-num {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1px;
    }
    .pred-lbl { font-size: 10px; color: var(--tx-2); margin-top: 5px; }
    .pred-diff {
      text-align: center;
      font-size: 11px;
      color: var(--tx-3);
      background: var(--bg-card2);
      border-radius: 6px;
      padding: 7px;
    }
    .pred-diff.over  { color: #f87171; }
    .pred-diff.under { color: #60a5fa; }

    /* Traffic */
    .traffic-big {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--tx-1);
      line-height: 1;
    }
    .traffic-sub {
      font-size: 10px;
      color: var(--tx-3);
      margin-top: 4px;
      margin-bottom: 12px;
    }
    .tbar {
      display: flex;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .tbar-seg { height: 100%; }
    .tleg {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .tleg-i {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--tx-2);
    }
    .tleg-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* Road grid */
    .road-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }
    .road-cell {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .road-cell-val {
      font-size: 16px;
      font-weight: 700;
      color: var(--tx-1);
      line-height: 1;
      letter-spacing: -0.3px;
    }
    .road-cell-lbl {
      font-size: 9px;
      color: var(--tx-3);
      margin-top: 4px;
    }

    /* Facility */
    .fac-item {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .fac-item:last-child { border-bottom: none; }
    .fac-icon-box {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .fac-body { flex: 1; min-width: 0; }
    .fac-dist {
      font-size: 16px;
      font-weight: 700;
      color: var(--tx-1);
      line-height: 1;
    }
    .fac-lbl { font-size: 10px; color: var(--tx-3); margin-top: 2px; }
    .fac-name {
      font-size: 10px;
      color: var(--tx-3);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: var(--bg-base);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      transition: opacity 0.5s;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    .ld-title { font-size: 16px; font-weight: 700; color: var(--tx-1); }
    .ld-sub   { font-size: 11px; color: var(--tx-3); }
    .ld-bar-wrap {
      width: 200px; height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .ld-bar {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--c-low), var(--c-vhigh));
      animation: ld 1.5s ease-in-out infinite;
    }
    @keyframes ld {
      0%   { width:0%;  margin-left:0; }
      50%  { width:70%; margin-left:0; }
      100% { width:0%;  margin-left:100%; }
    }

    /* ── LEAFLET ── */
    .leaflet-control-zoom {
      border: 1px solid var(--border-md) !important;
      background: rgba(10,10,15,0.85) !important;
      backdrop-filter: blur(12px);
    }
    .leaflet-control-zoom a {
      background: transparent !important;
      color: var(--tx-1) !important;
      border-bottom: 1px solid var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: rgba(255,255,255,0.07) !important; }
    .leaflet-control-attribution {
      background: rgba(10,10,15,0.7) !important;
      color: var(--tx-3) !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: #555570 !important; }
    .leaflet-tooltip {
      background: rgba(10,10,18,0.92) !important;
      border: 1px solid var(--border-md) !important;
      border-radius: 7px !important;
      color: var(--tx-1) !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 11px !important;
      padding: 5px 10px !important;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ════════════════════════════════
       MOBILE  (≤ 768px)
    ════════════════════════════════ */
    @media (max-width: 768px) {
      :root {
        --topbar-h: 50px;
      }

      /* 상단바 — 로고만, 범례/필터 숨김 */
      #legend { display: none; }
      #topbar-right { display: none; }
      #logo { min-width: unset; }
      #logo-title { font-size: 13px; }

      /* 검색바 — 전체 너비 */
      #search-wrap {
        left: 12px;
        right: 12px;
        width: auto;
        transform: none;
      }

      /* 사이드바 — 완전히 숨김 */
      #sidebar { display: none; }

      /* 디테일 패널 — 우측 슬라이드 → 하단 시트로 변경 */
      #detail-panel {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 70vh;
        border-left: none;
        border-top: 1px solid var(--border-md);
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
        padding: 0 14px 24px;
      }
      #detail-panel.open { transform: translateY(0); }

      /* 바텀시트 핸들 */
      #detail-panel::before {
        content: '';
        display: block;
        width: 36px;
        height: 4px;
        background: rgba(255,255,255,0.15);
        border-radius: 2px;
        margin: 12px auto 10px;
        flex-shrink: 0;
      }

      /* 하단 플로팅 버튼 바 */
      #mobile-bar {
        display: flex;
      }

      /* zoom 컨트롤 위치 조정 */
      .leaflet-control-zoom {
        margin-bottom: 80px !important;
      }
    }

    /* 모바일 플로팅 버튼 바 — PC에서는 숨김 */
    #mobile-bar {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 90;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-md);
      border-radius: 40px;
      padding: 8px 10px;
      gap: 6px;
      align-items: center;
    }
    .mb-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 14px;
      border-radius: 30px;
      background: none;
      border: none;
      color: var(--tx-2);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      min-width: 60px;
      -webkit-tap-highlight-color: transparent;
    }
    .mb-btn.active, .mb-btn:active {
      background: rgba(157,92,246,0.15);
      color: var(--c-mid);
    }
    .mb-divider {
      width: 1px;
      height: 24px;
      background: var(--border-md);
    }

    /* 모바일 필터 시트 */
    #mobile-filter-sheet {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 95;
      background: rgba(10,10,15,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-md);
      border-radius: 16px 16px 0 0;
      padding: 16px 20px 36px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    #mobile-filter-sheet.open { transform: translateY(0); }
    @media (max-width: 768px) {
      #mobile-filter-sheet { display: block; }
    }
    .mfs-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .mfs-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--tx-1);
      margin-bottom: 14px;
    }
    .mfs-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .mfs-chip {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border-md);
      background: var(--bg-card);
      color: var(--tx-2);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .mfs-chip.active {
      background: rgba(157,92,246,0.18);
      border-color: var(--c-mid);
      color: var(--c-mid);
    }
    .mfs-legend-title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--tx-3);
      margin-bottom: 10px;
    }
    .mfs-legend {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .mfs-leg-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--tx-2);
    }
    .mfs-leg-bar {
      height: 4px;
      border-radius: 2px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- 모바일 통계 시트 (detail panel 재활용) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(function () {
  'use strict';

  const RISK = [
    { label: '매우낮음', max: 2,        color: '#3d1a6e', weight: 1,   opacity: 0.40 },
    { label: '낮음',     max: 5,        color: '#6d2fcf', weight: 2,   opacity: 0.58 },
    { label: '중간',     max: 10,       color: '#9d5cf6', weight: 3,   opacity: 0.75 },
    { label: '높음',     max: 15,       color: '#c99cf2', weight: 4.5, opacity: 0.90 },
    { label: '매우높음', max: Infinity, color: '#ecdeff', weight: 6,   opacity: 1    },
  ];

  function getRisk(val) {
    for (const r of RISK) if (val < r.max) return r;
    return RISK[RISK.length - 1];
  }

  // Map
  const map = L.map('map', {
    center: [37.2890, 126.9970],
    zoom: 13,
    zoomControl: true,
    preferCanvas: true,
  });
  map.zoomControl.setPosition('bottomright');

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  let geojsonLayer = null;
  let allFeatures  = [];
  let selDistrict  = '';
  let selLayer     = null;
  let donutChart   = null;

  function featureStyle(feature) {
    const v = feature.properties.predicted_accident_count_clipped || 0;
    const r = getRisk(v);
    return { color: r.color, weight: r.weight, opacity: r.opacity, lineCap: 'round', lineJoin: 'round' };
  }

  function onEachFeature(feature, layer) {
    const p = feature.properties;
    const v = p.predicted_accident_count_clipped || 0;
    const r = getRisk(v);

    layer.on({
      mouseover(e) {
        if (layer !== selLayer) {
          e.target.setStyle({ weight: r.weight + 2, opacity: 1 });
          e.target.bringToFront();
        }
        layer.bindTooltip(
          `<strong>${p.road_name_viewt || p.road_name || '(무명)'}</strong><br>` +
          `예측 사고: <span style="color:${r.color};font-weight:700">${v.toFixed(1)}</span>건 · ${r.label}`,
          { sticky: true, direction: 'top' }
        ).openTooltip();
      },
      mouseout(e) {
        if (layer !== selLayer) {
          geojsonLayer.resetStyle(e.target);
          applyFilter(selDistrict);
        }
        layer.closeTooltip();
      },
      click() {
        if (selLayer && selLayer !== layer) {
          geojsonLayer.resetStyle(selLayer);
          applyFilter(selDistrict);
        }
        selLayer = layer;
        layer.setStyle({ weight: r.weight + 3, opacity: 1, color: r.color });
        openDetail(feature);
      },
    });
  }

  function applyFilter(district) {
    if (!geojsonLayer) return;
    geojsonLayer.eachLayer(layer => {
      if (layer === selLayer) return;
      const p = layer.feature.properties;
      const match = !district || (p.source_district && p.source_district.includes(district));
      const v = p.predicted_accident_count_clipped || 0;
      const r = getRisk(v);
      layer.setStyle({ color: r.color, weight: r.weight, opacity: match ? r.opacity : 0.06 });
    });
  }

  function openDetail(feature) {
    const p = feature.properties;
    const v = p.predicted_accident_count_clipped || 0;
    const actual = p.accident_count || 0;
    const r = getRisk(v);

    document.getElementById('detail-panel').classList.add('open');
    document.getElementById('detail-road-name').textContent =
      p.road_name_viewt || p.road_name || '(무명 도로)';

    // badges
    const bw = document.getElementById('detail-badges');
    bw.innerHTML = '';
    [p.source_district || p.region, p.road_rank_name].filter(Boolean).forEach(txt => {
      const b = document.createElement('span');
      b.className = 'dbadge';
      b.textContent = txt;
      bw.appendChild(b);
    });
    const rb = document.createElement('span');
    rb.className = 'dbadge risk';
    rb.style.background = r.color;
    rb.style.color = '#0a0a0f';
    rb.textContent = r.label;
    bw.appendChild(rb);

    // pred vs actual
    const predEl = document.getElementById('d-pred');
    predEl.textContent = v.toFixed(1);
    predEl.style.color = r.color;
    document.getElementById('d-actual').textContent = actual;

    const diff = v - actual;
    const diffEl = document.getElementById('d-diff');
    if (diff > 0.05) {
      diffEl.className = 'pred-diff over';
      diffEl.textContent = `▲ 예측이 실제보다 ${diff.toFixed(1)}건 많음`;
    } else if (diff < -0.05) {
      diffEl.className = 'pred-diff under';
      diffEl.textContent = `▼ 예측이 실제보다 ${Math.abs(diff).toFixed(1)}건 적음`;
    } else {
      diffEl.className = 'pred-diff';
      diffEl.textContent = '예측과 실제 거의 일치';
    }

    // traffic
    const tot = p.traffic_total_daily || 0;
    const car = p.traffic_car_daily   || 0;
    const bus = p.traffic_bus_daily   || 0;
    const trk = p.traffic_truck_daily || 0;
    document.getElementById('d-traffic').textContent = tot.toLocaleString();

    const barEl = document.getElementById('d-traffic-bar');
    const legEl = document.getElementById('d-traffic-legend');
    if (tot > 0) {
      const cp = (car/tot*100).toFixed(1);
      const bp = (bus/tot*100).toFixed(1);
      const tp = (trk/tot*100).toFixed(1);
      barEl.innerHTML = `
        <div class="tbar-seg" style="width:${cp}%;background:#9d5cf6"></div>
        <div class="tbar-seg" style="width:${bp}%;background:#c99cf2"></div>
        <div class="tbar-seg" style="width:${tp}%;background:#ecdeff"></div>`;
      legEl.innerHTML = `
        <div class="tleg-i"><div class="tleg-dot" style="background:#9d5cf6"></div>승용차 ${cp}%</div>
        <div class="tleg-i"><div class="tleg-dot" style="background:#c99cf2"></div>버스 ${bp}%</div>
        <div class="tleg-i"><div class="tleg-dot" style="background:#ecdeff"></div>화물 ${tp}%</div>`;
    } else {
      barEl.innerHTML = `<div class="tbar-seg" style="width:100%;background:rgba(255,255,255,0.07)"></div>`;
      legEl.innerHTML = `<span style="font-size:10px;color:var(--tx-3)">교통량 데이터 없음</span>`;
    }

    // road chars
    const lenKm = p.length ? (p.length/1000).toFixed(2) : '—';
    document.getElementById('d-road-grid').innerHTML = `
      <div class="road-cell">
        <div class="road-cell-val">${p.lanes || '—'}</div>
        <div class="road-cell-lbl">차로수</div>
      </div>
      <div class="road-cell">
        <div class="road-cell-val">${p.max_spd ? p.max_spd+'km/h' : '—'}</div>
        <div class="road-cell-lbl">제한속도</div>
      </div>
      <div class="road-cell">
        <div class="road-cell-val">${lenKm} km</div>
        <div class="road-cell-lbl">도로 길이</div>
      </div>
      <div class="road-cell">
        <div class="road-cell-val" style="font-size:11px">${p.road_rank_name || '—'}</div>
        <div class="road-cell-lbl">도로 등급</div>
      </div>`;

    // facilities
    document.getElementById('d-facilities').innerHTML = `
      <div class="fac-item">
        <div class="fac-icon-box">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="var(--c-mid)" stroke-width="2" aria-hidden="true">
            <rect x="1" y="3" width="15" height="13" rx="2"/>
            <path d="M16 8h4l3 3v5h-7V8z"/>
            <circle cx="5.5" cy="18.5" r="2.5"/>
            <circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
        </div>
        <div class="fac-body">
          <div class="fac-dist">${p.nearest_bus_stop_dist_m != null ? p.nearest_bus_stop_dist_m.toFixed(0)+' m' : '—'}</div>
          <div class="fac-lbl">버스 정류장</div>
          <div class="fac-name">${p.nearest_bus_stop || '—'}</div>
        </div>
      </div>
      <div class="fac-item">
        <div class="fac-icon-box">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="var(--c-high)" stroke-width="2" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
          </svg>
        </div>
        <div class="fac-body">
          <div class="fac-dist">${p.nearest_crosswalk_dist_m != null ? p.nearest_crosswalk_dist_m.toFixed(0)+' m' : '—'}</div>
          <div class="fac-lbl">횡단보도</div>
          <div class="fac-name">${p.nearest_crosswalk || '—'}</div>
        </div>
      </div>`;
  }

  function closeDetail() {
    document.getElementById('detail-panel').classList.remove('open');
    if (selLayer) {
      geojsonLayer.resetStyle(selLayer);
      applyFilter(selDistrict);
      selLayer = null;
    }
  }

  document.getElementById('detail-close').addEventListener('click', closeDetail);

  function buildSidebar(features) {
    const counts = [0,0,0,0,0];
    let sum = 0;
    features.forEach(f => {
      const v = f.properties.predicted_accident_count_clipped || 0;
      sum += v;
      const idx = RISK.findIndex(r => v < r.max);
      counts[idx >= 0 ? idx : 4]++;
    });
    document.getElementById('stat-avg').textContent = (sum/features.length).toFixed(1);
    document.getElementById('chart-center-val').textContent = (counts[3]+counts[4]).toLocaleString();

    if (donutChart) donutChart.destroy();
    donutChart = new Chart(
      document.getElementById('donut-chart').getContext('2d'),
      {
        type: 'doughnut',
        data: {
          labels: RISK.map(r => r.label),
          datasets: [{
            data: counts,
            backgroundColor: RISK.map(r => r.color + 'bb'),
            borderColor: RISK.map(r => r.color),
            borderWidth: 1,
            hoverBorderWidth: 2,
          }]
        },
        options: {
          cutout: '70%',
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: {
              label: c => ` ${c.label}: ${c.raw.toLocaleString()}개 (${(c.raw/features.length*100).toFixed(1)}%)`
            }}
          },
          animation: { duration: 700 },
        }
      }
    );

    const legEl = document.getElementById('chart-legend');
    legEl.innerHTML = '';
    RISK.forEach((r, i) => {
      const row = document.createElement('div');
      row.className = 'rl-row';
      row.innerHTML = `
        <div class="rl-left">
          <div class="rl-dot" style="background:${r.color}"></div>
          ${r.label}
        </div>
        <div class="rl-val">${counts[i].toLocaleString()}</div>`;
      legEl.appendChild(row);
    });

    // top 10
    const top10 = [...features]
      .sort((a,b) => (b.properties.predicted_accident_count_clipped||0)-(a.properties.predicted_accident_count_clipped||0))
      .slice(0,10);
    const listEl = document.getElementById('top10-list');
    listEl.innerHTML = '';
    top10.forEach((f,i) => {
      const p = f.properties;
      const v = p.predicted_accident_count_clipped || 0;
      const r = getRisk(v);
      const el = document.createElement('div');
      el.className = 'top-item';
      el.setAttribute('role','button');
      el.setAttribute('tabindex','0');
      el.setAttribute('aria-label', `${p.road_name_viewt||p.road_name} 도로로 이동`);
      const cls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      el.innerHTML = `
        <div class="top-num ${cls}">${i+1}</div>
        <div class="top-info">
          <div class="top-name">${p.road_name_viewt||p.road_name||'(무명)'}</div>
          <div class="top-sub">${p.source_district||''}</div>
        </div>
        <div class="top-score"
          style="background:${r.color}18;color:${r.color};border:1px solid ${r.color}44">
          ${v.toFixed(1)}
        </div>`;
      el.addEventListener('click', () => flyTo(f));
      el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') flyTo(f); });
      listEl.appendChild(el);
    });
  }

  function flyTo(feature) {
    let tgt = null;
    geojsonLayer.eachLayer(l => { if(l.feature===feature) tgt=l; });
    if (!tgt) return;
    const bounds = tgt.getBounds ? tgt.getBounds() : null;
    if (bounds && bounds.isValid()) map.flyToBounds(bounds, {maxZoom:16, duration:0.8});

    if (selLayer && selLayer !== tgt) { geojsonLayer.resetStyle(selLayer); applyFilter(selDistrict); }
    selLayer = tgt;
    const v = feature.properties.predicted_accident_count_clipped || 0;
    const r = getRisk(v);
    tgt.setStyle({ weight: r.weight+3, opacity:1, color: r.color });
    openDetail(feature);
  }

  // search
  const si = document.getElementById('search-input');
  const sr = document.getElementById('search-results');
  const sc = document.getElementById('search-clear');

  si.addEventListener('input', () => {
    const q = si.value.trim();
    sc.style.display = q ? 'flex' : 'none';
    if (!q) { sr.style.display='none'; return; }
    const hits = allFeatures
      .filter(f => (f.properties.road_name_viewt||f.properties.road_name||'').toLowerCase().includes(q.toLowerCase()))
      .slice(0,8);
    if (!hits.length) { sr.style.display='none'; return; }
    sr.innerHTML='';
    hits.forEach(f => {
      const p = f.properties;
      const div = document.createElement('div');
      div.className='search-item';
      div.setAttribute('role','option');
      div.innerHTML=`<span class="si-name">${p.road_name_viewt||p.road_name}</span><span class="si-tag">${p.source_district||''}</span>`;
      div.addEventListener('click', () => { si.value=p.road_name_viewt||p.road_name; sr.style.display='none'; flyTo(f); });
      sr.appendChild(div);
    });
    sr.style.display='block';
  });
  sc.addEventListener('click', () => { si.value=''; sc.style.display='none'; sr.style.display='none'; });
  document.addEventListener('click', e => { if(!document.getElementById('search-wrap').contains(e.target)) sr.style.display='none'; });

  document.getElementById('district-filter').addEventListener('change', e => {
    selDistrict = e.target.value;
    if (selLayer) closeDetail();
    applyFilter(selDistrict);
  });
  document.getElementById('btn-reset').addEventListener('click', () => {
    selDistrict='';
    document.getElementById('district-filter').value='';
    applyFilter('');
    if (selLayer) closeDetail();
    map.flyTo([37.2890,126.9970], 13, {duration:0.8});
  });

  // load data
  fetch('./suwon_wgs84.geojson')
    .then(r => { if(!r.ok) throw new Error('GeoJSON 로드 실패: '+r.status); return r.json(); })
    .then(data => {
      allFeatures = data.features;
      geojsonLayer = L.geoJSON(data, { style: featureStyle, onEachFeature }).addTo(map);
      buildSidebar(allFeatures);
      buildMobileLegend();
      const ld = document.getElementById('loading');
      ld.classList.add('fade');
      setTimeout(() => ld.remove(), 600);
    })
    .catch(err => {
      const ld = document.getElementById('loading');
      ld.querySelector('.ld-title').textContent = '데이터 로드 실패';
      ld.querySelector('.ld-sub').textContent = err.message+' — python3 -m http.server 로 실행하세요.';
      ld.querySelector('.ld-bar-wrap').style.display='none';
    });

  // ── MOBILE UI ──
  const isMobile = () => window.innerWidth <= 768;

  // 모바일 범례 채우기 (buildSidebar 후 호출)
  function buildMobileLegend() {
    const el = document.getElementById('mfs-legend');
    if (!el) return;
    el.innerHTML = '';
    RISK.forEach(r => {
      const row = document.createElement('div');
      row.className = 'mfs-leg-row';
      row.innerHTML = `
        <div class="mfs-leg-bar" style="width:${20 + RISK.indexOf(r)*8}px;background:${r.color}"></div>
        <span>${r.label}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--tx-3)">${r.max === Infinity ? '15건+' : '~'+r.max+'건'}</span>`;
      el.appendChild(row);
    });
  }

  // 필터 시트 토글
  const filterSheet = document.getElementById('mobile-filter-sheet');
  document.getElementById('mb-filter')?.addEventListener('click', () => {
    const isOpen = filterSheet.classList.contains('open');
    filterSheet.classList.toggle('open', !isOpen);
  });
  // 시트 바깥 탭 시 닫기
  filterSheet?.addEventListener('click', e => { if (e.target === filterSheet) filterSheet.classList.remove('open'); });

  // 모바일 구 필터 칩
  document.querySelectorAll('.mfs-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.mfs-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selDistrict = chip.dataset.val;
      // PC select도 동기화
      document.getElementById('district-filter').value = selDistrict;
      if (selLayer) closeDetail();
      applyFilter(selDistrict);
      filterSheet.classList.remove('open');
    });
  });

  // 모바일 초기화 버튼
  document.getElementById('mb-reset')?.addEventListener('click', () => {
    selDistrict = '';
    document.getElementById('district-filter').value = '';
    document.querySelectorAll('.mfs-chip').forEach(c => c.classList.toggle('active', c.dataset.val === ''));
    applyFilter('');
    if (selLayer) closeDetail();
    map.flyTo([37.2890, 126.9970], 13, { duration: 0.8 });
    filterSheet.classList.remove('open');
  });

  // 모바일 통계 버튼 — 사이드바 내용을 bottom sheet로 표시
  // detail panel을 통계 모드로 재사용
  let mobileStatsOpen = false;
  document.getElementById('mb-stats')?.addEventListener('click', () => {
    if (!isMobile()) return;
    filterSheet.classList.remove('open');
    if (mobileStatsOpen) {
      closeDetail();
      mobileStatsOpen = false;
      document.getElementById('mb-stats').classList.remove('active');
      return;
    }
    // 통계 패널 열기 — detail panel에 통계 HTML 주입
    const panel = document.getElementById('detail-panel');
    // 임시로 통계 뷰로 전환
    panel._detailMode = false;
    renderMobileStats(panel);
    panel.classList.add('open');
    mobileStatsOpen = true;
    document.getElementById('mb-stats').classList.add('active');
  });

  function renderMobileStats(panel) {
    const RISK_LOCAL = RISK;
    const counts = [0,0,0,0,0];
    let sum = 0;
    allFeatures.forEach(f => {
      const v = f.properties.predicted_accident_count_clipped || 0;
      sum += v;
      const idx = RISK_LOCAL.findIndex(r => v < r.max);
      counts[idx >= 0 ? idx : 4]++;
    });
    const avg = allFeatures.length ? (sum/allFeatures.length).toFixed(1) : '—';
    const highCount = counts[3] + counts[4];

    const top5 = [...allFeatures]
      .sort((a,b)=>(b.properties.predicted_accident_count_clipped||0)-(a.properties.predicted_accident_count_clipped||0))
      .slice(0,5);

    panel.innerHTML = `
      <div style="width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:12px auto 14px;flex-shrink:0"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px">
        <span style="font-size:14px;font-weight:700;color:var(--tx-1)">전체 통계</span>
        <button id="ms-close" style="background:rgba(255,255,255,0.07);border:1px solid var(--border-md);color:var(--tx-2);width:28px;height:28px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center" aria-label="닫기">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div class="kpi-card"><div class="kpi-val">3,213</div><div class="kpi-lbl">총 도로 구간</div></div>
        <div class="kpi-card"><div class="kpi-val">${avg}</div><div class="kpi-lbl">평균 예측 사고</div></div>
      </div>
      <div class="d-card" style="margin-bottom:10px">
        <div class="d-card-title">위험도 분포</div>
        ${RISK_LOCAL.map((r,i)=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;${i<RISK_LOCAL.length-1?'border-bottom:1px solid var(--border)':''}">
            <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--tx-2)">
              <div style="width:7px;height:7px;border-radius:50%;background:${r.color}"></div>${r.label}
            </div>
            <span style="font-size:12px;font-weight:700;color:var(--tx-1)">${counts[i].toLocaleString()}</span>
          </div>`).join('')}
      </div>
      <div class="sec-label" style="margin-bottom:6px">상위 위험 도로 TOP 5</div>
      <div class="top10-card">
        ${top5.map((f,i)=>{
          const p=f.properties;
          const v=p.predicted_accident_count_clipped||0;
          const r=getRisk(v);
          const cls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
          return `<div class="top-item" data-idx="${i}" style="cursor:pointer">
            <div class="top-num ${cls}">${i+1}</div>
            <div class="top-info">
              <div class="top-name">${p.road_name_viewt||p.road_name||'(무명)'}</div>
              <div class="top-sub">${p.source_district||''}</div>
            </div>
            <div class="top-score" style="background:${r.color}18;color:${r.color};border:1px solid ${r.color}44">${v.toFixed(1)}</div>
          </div>`;
        }).join('')}
      </div>`;

    // 이벤트
    document.getElementById('ms-close')?.addEventListener('click', () => {
      panel.classList.remove('open');
      mobileStatsOpen = false;
      document.getElementById('mb-stats')?.classList.remove('active');
      // detail-close 복원
      setTimeout(() => { if(!panel.classList.contains('open')) panel.innerHTML=''; }, 350);
    });
    panel.querySelectorAll('.top-item').forEach((el, i) => {
      el.addEventListener('click', () => {
        const top5f = [...allFeatures]
          .sort((a,b)=>(b.properties.predicted_accident_count_clipped||0)-(a.properties.predicted_accident_count_clipped||0))
          .slice(0,5);
        mobileStatsOpen = false;
        document.getElementById('mb-stats')?.classList.remove('active');
        flyTo(top5f[i]);
      });
    });
  }

  // detail panel close 버튼 — 통계 모드일 때도 작동하도록
  document.getElementById('detail-close')?.addEventListener('click', () => {
    mobileStatsOpen = false;
    document.getElementById('mb-stats')?.classList.remove('active');
  });

})();
</script>
</body>
</html>
